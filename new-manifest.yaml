# Source: minio/templates/create-bucket.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: create-bucket
  namespace:  default
  labels:
    app.kubernetes.io/component: minio-bucket-job
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-bucket
        image: minio/mc:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            mc alias set minio http://minio-service.default.svc.cluster.local:9000 \
              "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}" --api S3v4;

            mc mb --ignore-existing minio/${MINIO_DEFAULT_BUCKET};
            if [ $$? -ne 0 ]; then
              exit 1
            fi
        env:
        - name: MC_CONFIG_DIR
          value: "/tmp"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: MINIO_ROOT_USER
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: MINIO_ROOT_PASSWORD
        - name: MINIO_DEFAULT_BUCKET
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: DEFAULT_BUCKET
  backoffLimit: 3
---
# Source: minio/templates/update-route-host.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: update-minio-route-host
  namespace: default
  labels:
    app.kubernetes.io/component: minio-route-update
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
      - name: update-route-host
        image: quay.io/openshift/origin-cli:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            echo "Waiting for route minio-api to be ready..."
            for i in $(seq 1 30); do
              ROUTE_HOST=$(oc get route minio-api -n default -o jsonpath='{.status.host}' 2>/dev/null || echo "")
              if [ -n "$ROUTE_HOST" ]; then
                echo "Route hostname found: $ROUTE_HOST"
                oc patch configmap minio-config -n default --type merge -p "{\"data\":{\"BUCKET_HOST\":\"$ROUTE_HOST\"}}"
                echo "Successfully updated ConfigMap with route hostname: $ROUTE_HOST"
                exit 0
              fi
              echo "Attempt $i: Route not ready yet, waiting..."
              sleep 2
            done
            echo "Error: Could not get route hostname after 60 seconds"
            exit 1
  backoffLimit: 3
