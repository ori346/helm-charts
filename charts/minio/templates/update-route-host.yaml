apiVersion: batch/v1
kind: Job
metadata:
  name: update-minio-route-host
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: minio-route-update
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
      - name: update-route-host
        image: quay.io/openshift/origin-cli:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            echo "Waiting for route minio-api to be ready..."
            for i in $(seq 1 30); do
              ROUTE_HOST=$(oc get route minio-api -n {{ .Release.Namespace }} -o jsonpath='{.status.host}' 2>/dev/null || echo "")
              if [ -n "$ROUTE_HOST" ]; then
                echo "Route hostname found: $ROUTE_HOST"
                oc patch configmap minio-config -n {{ .Release.Namespace }} --type merge -p "{\"data\":{\"BUCKET_HOST\":\"$ROUTE_HOST\"}}"
                echo "Successfully updated ConfigMap with route hostname: $ROUTE_HOST"
                exit 0
              fi
              echo "Attempt $i: Route not ready yet, waiting..."
              sleep 2
            done
            echo "Error: Could not get route hostname after 60 seconds"
            exit 1
  backoffLimit: 3

